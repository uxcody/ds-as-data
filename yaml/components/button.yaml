# Button Component
# Interactive element that triggers actions

metadata:
  name: Button
  description: A clickable button element that triggers actions or navigation
  category: Actions
  version: 1.0.0
  complexity: basic

# Available variants
variants:
  - name: primary
    description: Main call-to-action button with high emphasis
    default: true

  - name: secondary
    description: Secondary action button with medium emphasis

  - name: tertiary
    description: Low emphasis button for less important actions

  - name: as-link
    description: Button styled as a text link

  - name: icon-only
    description: Button containing only an icon without text label

# Available sizes
sizes:
  - name: small
    description: Compact button for dense interfaces

  - name: medium
    description: Standard button size for most use cases
    default: true

  - name: large
    description: Larger button for prominent actions

# Component states
states:
  - name: default
    description: Normal resting state

  - name: hover
    description: Mouse cursor is over the button
    trigger: ":hover"

  - name: focus
    description: Button has keyboard focus
    trigger: ":focus"
    accessibility: true

  - name: active
    description: Button is being pressed
    trigger: ":active"

  - name: disabled
    description: Button cannot be interacted with
    trigger: "disabled attribute or aria-disabled"
    accessibility: true

  - name: loading
    description: Button is processing an action
    accessibility: true

# Props/Attributes
props:
  - name: label
    type: string
    description: Text content of the button
    required: false
    notes: Required unless icon-only variant

  - name: icon
    type: icon
    description: Icon to display in the button
    required: false

  - name: iconPosition
    type: enum
    description: Position of icon relative to label
    default: left
    options:
      - left
      - right

  - name: onClick
    type: function
    description: Callback function when button is clicked
    required: false

  - name: type
    type: enum
    description: HTML button type attribute
    default: button
    options:
      - button
      - submit
      - reset

  - name: disabled
    type: boolean
    description: Whether the button is disabled
    default: false

  - name: loading
    type: boolean
    description: Whether the button is in loading state
    default: false

  - name: ariaLabel
    type: string
    description: Accessible label for screen readers
    required: false
    notes: Required for icon-only variant

  - name: ariaPressed
    type: boolean
    description: Indicates toggle button state
    required: false

  - name: ariaExpanded
    type: boolean
    description: Indicates if button controls an expandable element
    required: false

# Accessibility requirements
accessibility:
  role: button

  keyboard:
    - key: Enter
      action: Activate button
    - key: Space
      action: Activate button

  aria:
    - attribute: aria-label
      required: when icon-only variant is used
      description: Provides accessible name when no visible text

    - attribute: aria-pressed
      required: when button acts as toggle
      description: Indicates the pressed state (true/false)

    - attribute: aria-expanded
      required: when button controls expandable content
      description: Indicates expanded state of controlled element

    - attribute: aria-disabled
      required: false
      description: Alternative to disabled attribute for custom disabled styling

  focus:
    required: true
    visible: true
    description: Must have clear visual focus indicator

  screen-reader:
    - loading state should announce "loading" or "busy"
    - disabled state should be announced
    - icon-only buttons must have aria-label

# Visual styling map (references design tokens)
styling:
