  common:
    border-radius: "effects.components.button.border-radius"
    border-width: "effects.components.button.border-width"
    transition-duration: "effects.components.button.transition-duration"
    transition-timing: "effects.components.button.transition-timing"
    transition-property: "effects.components.button.transition-property"

    focus:
      ring-width: "effects.components.button.focus.ring-width"
      ring-offset: "effects.components.button.focus.ring-offset"
      ring-color: "effects.components.button.focus.ring-color"

# Behavior specifications
behavior:
  - Loading state displays a spinner and prevents interaction
  - Disabled state prevents all interaction and updates cursor
  - Click handler should not fire when disabled or loading
  - Icon-only buttons maintain square aspect ratio
  - Focus follows standard browser tab order

# Usage guidelines
guidelines:
  do:
    - Use primary variant for the main action on a page
    - Use secondary for important but not primary actions
    - Use tertiary for less important or repeated actions
    - Provide aria-label for icon-only buttons
    - Use loading state for async operations

  dont:
    - Use multiple primary buttons in close proximity
    - Use icon-only buttons without clear iconography
    - Rely solely on color to convey disabled state
    - Use as-link variant when a semantic link element is more appropriate

# Examples of common use cases
examples:
  - name: Primary Action
    props:
      label: "Save Changes"
      variant: primary
      size: medium

  - name: Cancel Action
    props:
      label: "Cancel"
      variant: secondary
      size: medium

  - name: Icon Button
    props:
      icon: "close"
      variant: icon-only
      size: medium
      ariaLabel: "Close dialog"

  - name: Loading Button
    props:
      label: "Submitting..."
      variant: primary
      size: medium
      loading: true
      disabled: true

