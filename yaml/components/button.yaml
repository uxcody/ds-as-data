      background: "colors.assignments.button.primary.background"
      background-hover: "colors.assignments.button.primary.background-hover"
      background-active: "colors.assignments.button.primary.background-active"
      background-disabled: "colors.assignments.button.primary.background-disabled"
      color: "colors.assignments.button.primary.text"
      color-disabled: "colors.assignments.button.primary.text-disabled"
      border-color: "colors.assignments.button.primary.border"
      border-color-focus: "colors.assignments.button.primary.border-focus"
      shadow: "effects.components.button.variants.primary.shadow"
      shadow-hover: "effects.components.button.variants.primary.shadow-hover"

    secondary:
      background: "colors.assignments.button.secondary.background"
      background-hover: "colors.assignments.button.secondary.background-hover"
      background-active: "colors.assignments.button.secondary.background-active"
      background-disabled: "colors.assignments.button.secondary.background-disabled"
      color: "colors.assignments.button.secondary.text"
      color-disabled: "colors.assignments.button.secondary.text-disabled"
      border-color: "colors.assignments.button.secondary.border"
      border-color-hover: "colors.assignments.button.secondary.border-hover"
      border-color-focus: "colors.assignments.button.secondary.border-focus"
      border-color-disabled: "colors.assignments.button.secondary.border-disabled"
      shadow: "effects.components.button.variants.secondary.shadow"

    tertiary:
      background: "colors.assignments.button.tertiary.background"
      background-hover: "colors.assignments.button.tertiary.background-hover"
      background-active: "colors.assignments.button.tertiary.background-active"
      color: "colors.assignments.button.tertiary.text"
      color-hover: "colors.assignments.button.tertiary.text-hover"
      color-disabled: "colors.assignments.button.tertiary.text-disabled"
      shadow: "effects.components.button.variants.tertiary.shadow"

    as-link:
      color: "colors.assignments.button.as-link.text"
      color-hover: "colors.assignments.button.as-link.text-hover"
      color-visited: "colors.assignments.button.as-link.text-visited"
      color-disabled: "colors.assignments.button.as-link.text-disabled"

    icon-only:
      border-radius: "effects.components.button.variants.icon-only.border-radius"

  sizes:
    small:
      padding-x: "spacing.components.button.small.padding-x"
      padding-y: "spacing.components.button.small.padding-y"
      gap: "spacing.components.button.small.gap"
      min-height: "spacing.components.button.small.min-height"
      font-size: "typography.components.button.small.font-size"
      font-weight: "typography.components.button.small.font-weight"
      line-height: "typography.components.button.small.line-height"
      icon-size: 16

    medium:
      padding-x: "spacing.components.button.medium.padding-x"
      padding-y: "spacing.components.button.medium.padding-y"
      gap: "spacing.components.button.medium.gap"
      min-height: "spacing.components.button.medium.min-height"
      font-size: "typography.components.button.medium.font-size"
      font-weight: "typography.components.button.medium.font-weight"
      line-height: "typography.components.button.medium.line-height"
      icon-size: 20

    large:
      padding-x: "spacing.components.button.large.padding-x"
      padding-y: "spacing.components.button.large.padding-y"
      gap: "spacing.components.button.large.gap"
      min-height: "spacing.components.button.large.min-height"
      font-size: "typography.components.button.large.font-size"
      font-weight: "typography.components.button.large.font-weight"
      line-height: "typography.components.button.large.line-height"
