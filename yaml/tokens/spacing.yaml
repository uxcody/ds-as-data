# Spacing Tokens
# Design system spacing scale and component spacing assignments

metadata:
  name: Spacing
  description: Spacing scale and component-specific spacing values
  version: 1.0.0

# Base spacing scale (in pixels)
# Following an 8px base unit
scale:
  0: 0
  1: 4      # 0.25rem
  2: 8      # 0.5rem
  3: 12     # 0.75rem
  4: 16     # 1rem
  5: 20     # 1.25rem
  6: 24     # 1.5rem
  7: 28     # 1.75rem
  8: 32     # 2rem
  10: 40    # 2.5rem
  12: 48    # 3rem
  14: 56    # 3.5rem
  16: 64    # 4rem
  20: 80    # 5rem
  24: 96    # 6rem
  32: 128   # 8rem
  40: 160   # 10rem
  48: 192   # 12rem
  56: 224   # 14rem
  64: 256   # 16rem

# Component-specific spacing
components:
  button:
    small:
      padding-x: 12    # scale.3
      padding-y: 6     # scale.1.5 (between 1 and 2)
      gap: 4           # scale.1
      min-height: 32

    medium:
      padding-x: 16    # scale.4
      padding-y: 8     # scale.2
      gap: 8           # scale.2
      min-height: 40

    large:
      padding-x: 24    # scale.6
      padding-y: 12    # scale.3
      gap: 8           # scale.2
      min-height: 48

    icon-only:
      small: 32        # square
      medium: 40       # square
      large: 48        # square

  link:
    small:
      padding-x: 0
      padding-y: 2     # scale.0.5
      gap: 4           # scale.1

    medium:
      padding-x: 0
      padding-y: 4     # scale.1
      gap: 4           # scale.1

    large:
      padding-x: 0
      padding-y: 4     # scale.1
      gap: 8           # scale.2

  input:
    small:
      padding-x: 12    # scale.3
      padding-y: 6     # scale.1.5
      height: 32
      label-margin-bottom: 4   # scale.1
      help-text-margin-top: 4  # scale.1

    medium:
      padding-x: 16    # scale.4
      padding-y: 8     # scale.2
      height: 40
      label-margin-bottom: 6   # scale.1.5
      help-text-margin-top: 4  # scale.1

    large:
      padding-x: 16    # scale.4
      padding-y: 12    # scale.3
      height: 48
      label-margin-bottom: 8   # scale.2
      help-text-margin-top: 4  # scale.1

  card:
    padding:
      small: 16        # scale.4
      medium: 24       # scale.6
      large: 32        # scale.8

    gap: 16            # scale.4 (between sections)
    header-padding-bottom: 16
    footer-padding-top: 16

  dialog:
    padding: 24        # scale.6
    header-padding-bottom: 16
    footer-padding-top: 16
    gap: 16            # between sections

    sizes:
      small:
        width: 400
        max-width: "90vw"

      medium:
        width: 600
        max-width: "90vw"

      large:
        width: 800
        max-width: "90vw"

      fullscreen:
        width: "100vw"
        height: "100vh"

